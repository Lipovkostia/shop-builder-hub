<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>9999999999</title>
    <meta name="description" content="B2B каталог товаров" />

    <meta property="og:title" content="9999999999" />
    <meta property="og:description" content="B2B каталог товаров" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#555;gap:16px">
        <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#111;border-radius:50%;animation:spin 1s linear infinite"></div>
        <div style="font-size:14px">Загрузка…</div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Если приложение не смонтировалось за 25с — показать понятное сообщение вместо белого экрана
      setTimeout(function(){
        var root = document.getElementById('root');
        if (root && root.querySelector('[data-app-mounted]') === null && root.children.length <= 2) {
          root.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:24px;text-align:center;color:#333"><h1 style="font-size:20px;margin:0 0 12px">Не удалось загрузить страницу</h1><p style="margin:0 0 20px;color:#666;max-width:420px">Проверьте интернет-соединение и попробуйте обновить страницу.</p><button onclick="location.reload(true)" style="padding:10px 20px;background:#111;color:#fff;border:0;border-radius:8px;font-size:14px;cursor:pointer">Обновить</button></div>';
        }
      }, 25000);
    </script>
  </body>
</html>
