<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>9999999999</title>
    <meta name="description" content="B2B каталог товаров" />

    <meta property="og:title" content="9999999999" />
    <meta property="og:description" content="B2B каталог товаров" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Telegram Mini App SDK (no-op outside Telegram) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#111827;gap:14px;padding:24px;background:#f8fafc">
        <div style="font-size:14px;font-weight:700">Загрузка сайта</div>
        <div style="width:min(280px,82vw);height:8px;overflow:hidden;border-radius:999px;background:#e5e7eb">
          <div id="boot-progress-bar" style="width:4%;height:100%;border-radius:999px;background:#22c55e;transition:width .35s ease"></div>
        </div>
        <div id="boot-progress-text" style="font-size:13px;color:#4b5563">4%</div>
        <div id="boot-progress-stage" style="font-size:12px;color:#6b7280;text-align:center;max-width:300px">Подключение…</div>
      </div>
    </div>
    <script>
      (function () {
        var progress = 4;
        var stage = 'Подключение…';
        var bar = function () { return document.getElementById('boot-progress-bar'); };
        var text = function () { return document.getElementById('boot-progress-text'); };
        var label = function () { return document.getElementById('boot-progress-stage'); };
        function render() {
          var next = Math.max(0, Math.min(100, Math.round(progress)));
          var barEl = bar();
          var textEl = text();
          var labelEl = label();
          if (barEl) barEl.style.width = next + '%';
          if (textEl) textEl.textContent = next + '%';
          if (labelEl) labelEl.textContent = stage;
        }
        window.__setBootProgress = function (value, message) {
          progress = Math.max(progress, value || progress);
          if (message) stage = message;
          render();
        };
        var timer = setInterval(function () {
          var root = document.getElementById('root');
          if (!root || root.getAttribute('data-app-mounted') === '1') {
            clearInterval(timer);
            return;
          }
          if (progress < 32) progress += 2;
          else if (progress < 58) progress += 1;
          else if (progress < 82) progress += 0.35;
          stage = progress < 35 ? 'Загрузка файлов…' : progress < 70 ? 'Подготовка интерфейса…' : 'Почти готово…';
          render();
        }, 450);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Фолбэк только если React реально не смог смонтироваться (нет атрибута data-app-mounted).
      // Не трогаем DOM, если приложение уже работает — иначе мы его уничтожим.
      setTimeout(function () {
        var root = document.getElementById('root');
        if (!root) return;
        if (root.getAttribute('data-app-mounted') === '1') return;
        root.innerHTML = '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:24px;text-align:center;color:#333;background:#f8fafc"><h1 style="font-size:20px;margin:0 0 12px">Не удалось загрузить страницу</h1><p style="margin:0 0 20px;color:#666;max-width:420px">Загрузка остановилась. Проверьте интернет-соединение и попробуйте обновить страницу.</p><button onclick="location.reload()" style="padding:10px 20px;background:#111;color:#fff;border:0;border-radius:8px;font-size:14px;cursor:pointer">Обновить</button></div>';
      }, 30000);
    </script>
  </body>
</html>
